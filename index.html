<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <!-- SEO -->

    <!-- Open Graph -->

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preload hero video poster for faster LCP -->
    <link rel="preload" as="image" href="/images/bg-video/poster.jpg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data (JSON-LD) for GEO -->
    <script type="application/ld+json">

      "@type": "LocalBusiness",
      "name": "Renovelli Estética Automotiva",
      "image": "https://renovelli.com.br/images/bg-video/poster.jpg",
      "@id": "https://renovelli.com.br/#organization",
      "url": "https://renovelli.com.br/",
      "telephone": "+551100000000",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Rua Caminho do Pilar, 1758",
        "addressLocality": "Santo André",
        "addressRegion": "SP",
        "postalCode": "09190-000",
        "addressCountry": "BR"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": -23.6666,
        "longitude": -46.5333
      },
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"],
        "opens": "08:00",
        "closes": "18:00"
      },
      "sameAs": [
        "https://www.instagram.com/renovelli.estetica/"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Serviços de Estética Automotiva",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Polimento Técnico",

            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Vitrificação (Ceramic Coating)",
              "description": "Proteção nano-cerâmica de alta durabilidade para o verniz do veículo."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Funilaria Premium",
              "description": "Reparo estrutural e pintura padrão de fábrica (OEM)."
            }
          }
        ]
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
